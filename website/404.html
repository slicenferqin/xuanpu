<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>页面没找到 · 玄圃 Xuanpu</title>
    <meta name="description" content="你访问的页面不在这片工作场。回到玄圃首页继续。" />
    <meta name="robots" content="noindex,follow" />
    <link rel="canonical" href="https://xuanpu.clawplay.club/" />
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
    <meta name="theme-color" content="#eff1f5" />
    <style>
      :root {
        color-scheme: light;
        --latte-base: #eff1f5;
        --latte-text: #4c4f69;
        --latte-subtext: #6c6f85;
        --jade-dark: #1e2b27;
        --jade: #7fb69a;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #f7f3ea 0%, #eff1f5 50%, #e6e9ef 100%);
        color: var(--latte-text);
        font-family:
          ui-sans-serif, -apple-system, BlinkMacSystemFont, "SF Pro Text",
          "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      }
      main {
        text-align: center;
        padding: 32px 24px;
        max-width: 520px;
      }
      .code {
        display: inline-block;
        font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
        font-size: 13px;
        letter-spacing: 0.12em;
        color: var(--latte-subtext);
        text-transform: uppercase;
        margin-bottom: 14px;
      }
      h1 {
        margin: 0 0 14px;
        font-size: clamp(36px, 6vw, 56px);
        font-weight: 750;
        color: var(--jade-dark);
      }
      p {
        margin: 0 0 28px;
        font-size: 15px;
        line-height: 1.7;
        color: var(--latte-subtext);
      }
      .actions {
        display: inline-flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
      }
      a {
        text-decoration: none;
        border-radius: 999px;
        padding: 11px 20px;
        font-size: 14px;
        font-weight: 600;
        transition: transform 160ms ease, background 160ms ease;
      }
      a.primary {
        background: var(--jade-dark);
        color: #f5fbf7;
      }
      a.primary:hover {
        background: #263f37;
        transform: translateY(-1px);
      }
      a.secondary {
        background: rgba(255, 255, 255, 0.7);
        color: var(--latte-text);
        border: 1px solid rgba(76, 79, 105, 0.14);
      }
      a.secondary:hover {
        background: #fff;
        transform: translateY(-1px);
      }
    </style>
  </head>
  <body>
    <main>
      <span class="code">404 · Page not found</span>
      <h1>这片现场不在玄圃里</h1>
      <p>你要找的页面没找到。回到玄圃首页，或去 GitHub 提个 issue 告诉我们什么链接坏了。</p>
      <div class="actions">
        <a class="primary" href="/">回到首页</a>
        <a class="secondary" href="https://github.com/slicenferqin/xuanpu/issues" target="_blank" rel="noreferrer">提交 Issue</a>
      </div>
    </main>
  </body>
</html>
