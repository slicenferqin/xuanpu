server {
    listen 80;
    listen [::]:80;
    server_name xuanpu.clawplay.club;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name xuanpu.clawplay.club;

    root /var/www/xuanpu;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/xuanpu.clawplay.club/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xuanpu.clawplay.club/privkey.pem;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
}
