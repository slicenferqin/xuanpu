server {
    listen 80;
    listen [::]:80;
    server_name xuanpu.clawplay.club;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name xuanpu.clawplay.club;

    root /var/www/xuanpu;
    index index.html;
    charset utf-8;

    ssl_certificate /etc/letsencrypt/live/xuanpu.clawplay.club/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xuanpu.clawplay.club/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # ---- Security headers ----
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-Frame-Options SAMEORIGIN always;

    # ---- Compression ----
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/ld+json
        image/svg+xml;

    # Brotli — enable only when ngx_brotli is loaded.
    # On Debian/Ubuntu: apt install libnginx-mod-http-brotli libnginx-mod-http-brotli-static
    # This server currently has no brotli module, so keep these lines commented.
    # brotli on;
    # brotli_comp_level 5;
    # brotli_types
    #     text/plain
    #     text/css
    #     text/xml
    #     application/javascript
    #     application/json
    #     application/xml
    #     application/ld+json
    #     image/svg+xml;

    # ---- English landing page ----
    location = /en { return 301 https://$host/en/; }
    location /en/ {
        try_files $uri $uri/ /en/index.html;
    }

    # ---- Default: SPA-style fallback to /index.html ----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- Explicit content-types & short cache for crawler files ----
    location = /robots.txt    { default_type text/plain;       expires 1d; }
    location = /sitemap.xml   { default_type application/xml;  expires 1d; }
    location = /humans.txt    { default_type text/plain;       expires 7d; }
    location ^~ /.well-known/ { default_type text/plain; }

    # HTML: short cache + must-revalidate (frequent content updates)
    # Repeat security headers here because nginx add_header is not inherited once a
    # child location defines its own add_header.
    location ~* \.html$ {
        expires 5m;
        add_header Cache-Control "public, max-age=300, must-revalidate";
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header X-Frame-Options SAMEORIGIN always;
    }

    # Static assets: long cache + immutable
    # Repeat security headers here for the same add_header inheritance reason.
    location ~* \.(?:css|js|png|jpg|jpeg|gif|ico|svg|webp|avif|woff2?)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header X-Frame-Options SAMEORIGIN always;
    }

    error_page 404 /404.html;
    location = /404.html { internal; }
}
