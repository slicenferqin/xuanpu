name: Release Xuanpu

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.ref_name, '-canary.') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS ARM64 — native build on ARM64 runner
          - os: macos-latest
            platform: mac
            arch: arm64
            eb_flags: --mac --arm64
          # macOS x64 — cross-compile on ARM64 runner via @electron/rebuild
          - os: macos-latest
            platform: mac
            arch: x64
            eb_flags: --mac --x64
            needs_rebuild: true
          # Windows x64
          - os: windows-latest
            platform: win
            arch: x64
            eb_flags: --win --x64
          # Windows ARM64 — cross-compile on x64 runner
          - os: windows-latest
            platform: win
            arch: arm64
            eb_flags: --win --arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # ── macOS: optional Ghostty native addon ──
      - name: Download libghostty (optional, macOS only)
        if: matrix.platform == 'mac'
        continue-on-error: true
        id: ghostty
        run: |
          mkdir -p vendor
          gh release download ghostty-deps-v1 -p libghostty.a -D vendor/ --repo slicenferqin/xuanpu
          echo "available=true" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Python setuptools is needed for node-gyp (distutils removed in Python 3.12+)
      - name: Ensure setuptools (macOS)
        if: matrix.platform == 'mac'
        run: pip3 install --break-system-packages setuptools

      - name: Ensure setuptools (Windows)
        if: matrix.platform == 'win'
        run: pip3 install setuptools

      - run: pnpm install --frozen-lockfile

      - name: Build Ghostty native addon
        if: matrix.platform == 'mac' && steps.ghostty.outputs.available == 'true'
        run: pnpm build:native
        env:
          GHOSTTY_LIB_PATH: ${{ github.workspace }}/vendor/libghostty.a

      - run: pnpm build
        env:
          GHOSTTY_LIB_PATH: ${{ matrix.platform == 'mac' && steps.ghostty.outputs.available == 'true' && format('{0}/vendor/libghostty.a', github.workspace) || '' }}

      # Cross-architecture: rebuild native modules for the target arch
      # This is needed when host arch != target arch (e.g., arm64 runner building x64)
      - name: Rebuild native modules for ${{ matrix.arch }}
        if: matrix.needs_rebuild
        run: pnpm exec electron-rebuild --arch=${{ matrix.arch }}

      # macOS: electron-builder.yml mac.extraResources references ghostty.node
      - name: Ensure ghostty.node placeholder (macOS)
        if: matrix.platform == 'mac'
        run: |
          if [ ! -f src/native/build/Release/ghostty.node ]; then
            mkdir -p src/native/build/Release
            touch src/native/build/Release/ghostty.node
            echo "Created placeholder ghostty.node (ghostty not available)"
          else
            echo "ghostty.node exists from native build"
          fi

      # cloudflared binaries are NOT committed (they're 270MB across all 6
      # platforms). electron-builder.yml mac/win/linux.extraResources
      # references resources/cloudflared/<platform>/cloudflared, so they
      # must exist on disk before packaging. Without this step the public-
      # tunnel feature ships broken — exactly what hit v1.4.0.
      - name: Download cloudflared binaries
        shell: bash
        run: bash scripts/download-cloudflared.sh

      # ── Package — each job builds ONE arch only ──
      - name: Package (${{ matrix.platform }} ${{ matrix.arch }})
        run: pnpm exec electron-builder ${{ matrix.eb_flags }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Verify ──
      - name: Verify build output
        if: always()
        shell: bash
        run: |
          echo "=== dist contents ==="
          ls -lh dist/ 2>/dev/null || echo "dist/ not found"
