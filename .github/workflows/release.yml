name: Release Xuanpu

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.ref_name, '-canary.') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS ARM64 — native build on ARM64 runner
          - os: macos-latest
            platform: mac
            arch: arm64
            eb_flags: --mac --arm64
          # macOS x64 — cross-compile on ARM64 runner via @electron/rebuild
          - os: macos-latest
            platform: mac
            arch: x64
            eb_flags: --mac --x64
            needs_rebuild: true
          # Windows x64
          - os: windows-latest
            platform: win
            arch: x64
            eb_flags: --win --x64
          # Windows ARM64 — cross-compile on x64 runner
          - os: windows-latest
            platform: win
            arch: arm64
            eb_flags: --win --arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # ── macOS: optional Ghostty native addon ──
      - name: Download libghostty (optional, macOS only)
        if: matrix.platform == 'mac'
        continue-on-error: true
        id: ghostty
        run: |
          mkdir -p vendor
          gh release download ghostty-deps-v1 -p libghostty.a -D vendor/ --repo slicenferqin/xuanpu
          echo "available=true" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Python setuptools is needed for node-gyp (distutils removed in Python 3.12+)
      - name: Ensure setuptools (macOS)
        if: matrix.platform == 'mac'
        run: pip3 install --break-system-packages setuptools

      - name: Ensure setuptools (Windows)
        if: matrix.platform == 'win'
        run: pip3 install setuptools

      - run: pnpm install --frozen-lockfile

      - name: Build Ghostty native addon
        if: matrix.platform == 'mac' && steps.ghostty.outputs.available == 'true'
        run: pnpm build:native
        env:
          GHOSTTY_LIB_PATH: ${{ github.workspace }}/vendor/libghostty.a

      - run: pnpm build
        env:
          GHOSTTY_LIB_PATH: ${{ matrix.platform == 'mac' && steps.ghostty.outputs.available == 'true' && format('{0}/vendor/libghostty.a', github.workspace) || '' }}

      # Cross-architecture: rebuild native modules for the target arch
      # This is needed when host arch != target arch (e.g., arm64 runner building x64)
      - name: Rebuild native modules for ${{ matrix.arch }}
        if: matrix.needs_rebuild
        run: pnpm exec electron-rebuild --arch=${{ matrix.arch }}

      # macOS: electron-builder.yml mac.extraResources references ghostty.node
      - name: Ensure ghostty.node placeholder (macOS)
        if: matrix.platform == 'mac'
        run: |
          if [ ! -f src/native/build/Release/ghostty.node ]; then
            mkdir -p src/native/build/Release
            touch src/native/build/Release/ghostty.node
            echo "Created placeholder ghostty.node (ghostty not available)"
          else
            echo "ghostty.node exists from native build"
          fi

      # cloudflared binaries are NOT committed (they're 270MB across all 6
      # platforms). electron-builder.yml mac/win/linux.extraResources
      # references resources/cloudflared/<platform>/cloudflared, so they
      # must exist on disk before packaging. Without this step the public-
      # tunnel feature ships broken — exactly what hit v1.4.0.
      - name: Download cloudflared binaries
        shell: bash
        run: bash scripts/download-cloudflared.sh

      # Mobile UI (#44) — built by the standalone Vite project under
      # mobile/. The output (mobile/dist/) is referenced by
      # extraResources `from: mobile/dist, to: mobile-ui` and served by
      # hub-server.tryServeStatic at runtime. Local build:mac/build:win
      # scripts run this automatically; CI forgot. Without this step
      # the Hub server returns {"error":{"code":"NOT_FOUND","message":"/"}}
      # when a user opens the URL in a browser — exactly what hit v1.4.0
      # and v1.4.1.
      - name: Build mobile UI
        run: pnpm run build:mobile

      # ── Package — each job builds ONE arch only ──
      # NOTE: --publish never is intentional. We publish in a separate step
      # AFTER the post-package verify below, so a missing cloudflared / mobile
      # asset never reaches the GitHub release page. See v1.4.0/v1.4.1
      # post-mortems above.
      - name: Package (${{ matrix.platform }} ${{ matrix.arch }})
        run: pnpm exec electron-builder ${{ matrix.eb_flags }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Verify packaging completeness ──
      # Post-package assertion: makes sure every artifact carries the
      # bits that broke v1.4.0 / v1.4.1 (cloudflared binary + mobile UI
      # dist + native .node addons). Fails the workflow before publish
      # if anything is missing, so we never ship an empty-tunnel /
      # 404-mobile-page release again.
      - name: Verify packaging completeness (macOS)
        if: matrix.platform == 'mac'
        shell: bash
        run: |
          set -euo pipefail
          echo "=== dist contents ==="
          ls -lh dist/ || true

          # Locate the .app — electron-builder names the dir mac-<arch>
          # for non-default arch and `mac` for arm64 native, depending on
          # version. Glob to be safe.
          APP_PATH=$(find dist -maxdepth 3 -type d -name '*.app' | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app bundle found under dist/"
            exit 1
          fi
          RES="$APP_PATH/Contents/Resources"
          echo "Checking $RES"

          fail=0
          check_file() {
            if [ ! -f "$1" ]; then
              echo "::error::missing file: $1"
              fail=1
            else
              echo "ok: $1 ($(stat -f%z "$1" 2>/dev/null || stat -c%s "$1") bytes)"
            fi
          }

          # cloudflared — only the matching arch is packed in
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            check_file "$RES/cloudflared/darwin-arm64/cloudflared"
          else
            check_file "$RES/cloudflared/darwin-amd64/cloudflared"
          fi

          # mobile UI shipped to Resources/mobile-ui
          check_file "$RES/mobile-ui/index.html"

          # asar + unpacked native addons
          check_file "$RES/app.asar"
          if [ ! -d "$RES/app.asar.unpacked" ]; then
            echo "::error::missing app.asar.unpacked"
            fail=1
          fi
          # native .node addons must be extracted
          if ! find "$RES/app.asar.unpacked" -name '*.node' | grep -q .; then
            echo "::error::no .node files extracted under app.asar.unpacked"
            fail=1
          fi

          # ghostty placeholder (or real binary) referenced by extraResources
          check_file "$RES/native/ghostty.node"

          # cloudflared binary must be non-empty (the v1.4.0 bug was a 0-byte file)
          CF_BIN="$RES/cloudflared/darwin-${{ matrix.arch == 'arm64' && 'arm64' || 'amd64' }}/cloudflared"
          if [ -f "$CF_BIN" ] && [ ! -s "$CF_BIN" ]; then
            echo "::error::cloudflared binary is empty: $CF_BIN"
            fail=1
          fi

          if [ "$fail" -ne 0 ]; then
            echo "::error::Packaging verification failed — refusing to publish"
            exit 1
          fi
          echo "Packaging verification passed."

      - name: Verify packaging completeness (Windows)
        if: matrix.platform == 'win'
        shell: bash
        run: |
          set -euo pipefail
          echo "=== dist contents ==="
          ls -lh dist/ || true

          # Locate the unpacked dir — usually win-unpacked or win-arm64-unpacked
          UNPACKED=$(find dist -maxdepth 2 -type d -name '*unpacked*' | head -n 1)
          if [ -z "$UNPACKED" ]; then
            echo "::error::No *-unpacked directory found under dist/"
            exit 1
          fi
          RES="$UNPACKED/resources"
          echo "Checking $RES"

          fail=0
          check_file() {
            if [ ! -f "$1" ]; then
              echo "::error::missing file: $1"
              fail=1
            else
              echo "ok: $1"
            fi
          }

          if [ "${{ matrix.arch }}" = "arm64" ]; then
            check_file "$RES/cloudflared/windows-arm64/cloudflared.exe"
          else
            check_file "$RES/cloudflared/windows-amd64/cloudflared.exe"
          fi

          check_file "$RES/mobile-ui/index.html"
          check_file "$RES/app.asar"

          if [ ! -d "$RES/app.asar.unpacked" ]; then
            echo "::error::missing app.asar.unpacked"
            fail=1
          fi
          if ! find "$RES/app.asar.unpacked" -name '*.node' | grep -q .; then
            echo "::error::no .node files extracted under app.asar.unpacked"
            fail=1
          fi

          # Setup installer / zip artifact must exist
          if ! ls dist/Xuanpu-Setup-*.exe >/dev/null 2>&1 && ! ls dist/Xuanpu-*-${{ matrix.arch }}-win.zip >/dev/null 2>&1; then
            echo "::error::no Windows installer or zip found in dist/"
            fail=1
          fi

          if [ "$fail" -ne 0 ]; then
            echo "::error::Packaging verification failed — refusing to publish"
            exit 1
          fi
          echo "Packaging verification passed."

      - name: List dist (always)
        if: always()
        shell: bash
        run: |
          echo "=== dist contents ==="
          ls -lh dist/ 2>/dev/null || echo "dist/ not found"

      # ── Publish (after verify) ──
      # Only runs if all previous steps succeeded — verify acts as a gate.
      # We upload the artifacts that electron-builder produced under dist/,
      # plus the auto-update metadata YAML files (latest-mac.yml /
      # latest.yml) so the in-app updater keeps working.
      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          # Create the release if it doesn't exist yet (first matrix job to land wins).
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --draft --title "$TAG" --notes "Automated release for $TAG"
          fi
          # Collect platform-relevant artifacts.
          shopt -s nullglob
          files=()
          if [ "${{ matrix.platform }}" = "mac" ]; then
            files+=(dist/Xuanpu-*-${{ matrix.arch }}-mac.dmg dist/Xuanpu-*-${{ matrix.arch }}-mac.zip dist/latest-mac.yml dist/latest-mac-${{ matrix.arch }}.yml)
          else
            files+=(dist/Xuanpu-Setup-*.exe dist/Xuanpu-*-${{ matrix.arch }}-win.zip dist/latest.yml dist/latest-${{ matrix.arch }}.yml)
          fi
          # Filter to existing files only.
          existing=()
          for f in "${files[@]}"; do
            [ -f "$f" ] && existing+=("$f")
          done
          if [ ${#existing[@]} -eq 0 ]; then
            echo "::error::No artifacts to upload for ${{ matrix.platform }} ${{ matrix.arch }}"
            exit 1
          fi
          echo "Uploading: ${existing[*]}"
          gh release upload "$TAG" "${existing[@]}" --clobber
