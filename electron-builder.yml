appId: com.slicenfer.xuanpu
productName: '玄圃'
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
  - resources/**/*

# Cross-platform extra resources — copied, not packed into ASAR, so the skill
# service can enumerate them at runtime with plain fs APIs.
extraResources:
  - from: resources/built-in-skills
    to: built-in-skills
    filter:
      - '**/*'
  # cloudflared binaries for the Hub public-tunnel feature. Each platform
  # subdirectory is picked up at runtime by tunnel-service.resolveBinary().
  # Run scripts/download-cloudflared.sh before packaging.
  - from: resources/cloudflared
    to: cloudflared
    filter:
      - '**/*'
  # Mobile UI (#44) — built by `pnpm build:mobile`. The hub-server resolves
  # this to resources/mobile-ui at runtime via hub-controller.defaultMobileDistRoot.
  - from: mobile/dist
    to: mobile-ui
    filter:
      - '**/*'

# Native .node binaries cannot be loaded from inside an ASAR archive.
# This extracts them to app.asar.unpacked/ at build time.
asarUnpack:
  - '**/*.node'
  - '**/better-sqlite3/**'
  - '**/node-pty/**'

# ── macOS ──────────────────────────────────────────────
mac:
  icon: resources/icon.icns
  artifactName: 'Xuanpu-${version}-${arch}-mac.${ext}'
  extraResources:
    - from: src/native/build/Release/ghostty.node
      to: native/ghostty.node
  category: public.app-category.developer-tools
  # Hub mode needs the Local Network prompt + server entitlement so the
  # loopback HTTP/WS server and cloudflared child process can open sockets.
  extendInfo:
    NSLocalNetworkUsageDescription: 玄圃需要在本机网络上运行 Hub 服务，以便手机远程访问您的会话。
  # Signing & notarization disabled until Apple Developer certificate is set up.
  # To enable: set CSC_LINK, CSC_KEY_PASSWORD, APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD,
  # APPLE_TEAM_ID in GitHub Secrets, then uncomment the lines below.
  # hardenedRuntime: true
  # entitlements: resources/entitlements.mac.plist
  # entitlementsInherit: resources/entitlements.mac.inherit.plist
  # notarize: true
  identity: null
  gatekeeperAssess: false
  # NOTE: arch is NOT specified here — it is controlled by CLI flags
  # (--arm64 or --x64) in the release workflow. Listing both architectures
  # here causes electron-builder to build BOTH in a single invocation,
  # which corrupts native modules (the second arch rebuild overwrites the first).
  target:
    - dmg
    - zip

dmg:
  sign: false

# ── Windows ────────────────────────────────────────────
win:
  icon: resources/icon.ico
  artifactName: 'Xuanpu-${version}-${arch}-win.${ext}'
  # NOTE: arch controlled by CLI flags (--x64 or --arm64) in release workflow.
  target:
    - nsis
    - zip

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  artifactName: 'Xuanpu-Setup-${version}.${ext}'

# ── Linux ──────────────────────────────────────────────
linux:
  icon: resources/icon.png
  category: Development

# ── Auto-update ───────────────────────────────────────
publish:
  - provider: github
    owner: slicenferqin
    repo: xuanpu
